<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel de Ventas | CUTiendita</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="LOGO_CUTIENDITA.png" alt="CUTiendita Logo" class="nav-logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Ir al Catálogo</a></li>
            <li><a href="#" class="active">Mi Panel</a></li>
        </ul>
    </nav>

    <main id="app-container" class="page active">
        <div class="dashboard-header">
            <div>
                <h2>Mi Panel de Ventas</h2>
                <p id="welcome-msg">Cargando perfil...</p>
            </div>
            <button class="btn-logout" onclick="logoutUser()">Cerrar Sesión</button>
        </div>

        <div class="dashboard-grid">
            <div class="form-card native-card">
                <h3>+ Publicar Producto</h3>
                <p class="form-subtitle" style="margin-bottom: 1.5rem;">Pon a la venta un nuevo artículo en el campus</p>
                
                <div class="input-group">
                    <select id="prod-categoria" required style="width: 100%; padding: 1rem; border: 1px solid var(--border); background: transparent; border-radius: 10px; outline: none; font-size: 1rem; color: var(--text-main);">
                        <option value="" disabled selected hidden>Selecciona una categoría</option>
                        <option value="Comida">🍔 Comida / Botanas</option>
                        <option value="Ropa">👕 Ropa / Accesorios</option>
                        <option value="Papeleria">📚 Papelería / Libros</option>
                        <option value="Electronica">⚡ Electrónica / Celulares</option>
                        <option value="Otros">✨ Otros</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="text" id="prod-nombre" required placeholder=" ">
                    <label>Nombre del producto</label>
                </div>
                <div class="input-group">
                    <input type="text" id="prod-precio" required placeholder=" ">
                    <label>Precio (Ej: $50)</label>
                </div>
                <div class="input-group">
                    <input type="text" id="prod-desc" required placeholder=" ">
                    <label>Descripción corta</label>
                </div>
                <div class="input-group">
                    <input type="url" id="prod-img" required placeholder=" ">
                    <label>URL de la imagen del producto</label>
                </div>
                <button class="btn-block" onclick="publicarProductoForm()">Subir Producto</button>
            </div>

            <div class="my-products-container">
                <h3>Mis Productos Activos</h3>
                <div id="my-products-list" class="my-products">
                    </div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Editar Producto</h3>
            <p class="form-subtitle">Modifica las propiedades de tu artículo</p>
            <input type="hidden" id="edit-prod-id">
            
            <div class="input-group">
                <select id="edit-prod-categoria" required style="width: 100%; padding: 1rem; border: 1px solid var(--border); background: transparent; border-radius: 10px; outline: none; font-size: 1rem; margin-bottom: 1rem; color: var(--text-main);">
                    <option value="Comida">🍔 Comida / Botanas</option>
                    <option value="Ropa">👕 Ropa / Accesorios</option>
                    <option value="Papeleria">📚 Papelería / Libros</option>
                    <option value="Electronica">⚡ Electrónica / Celulares</option>
                    <option value="Otros">✨ Otros</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="edit-prod-nombre" required placeholder=" ">
                <label>Nombre del producto</label>
            </div>
            <div class="input-group">
                <input type="text" id="edit-prod-precio" required placeholder=" ">
                <label>Precio</label>
            </div>
            <div class="input-group">
                <input type="text" id="edit-prod-desc" required placeholder=" ">
                <label>Descripción corta</label>
            </div>
            <div class="input-group">
                <input type="url" id="edit-prod-img" required placeholder=" ">
                <label>URL de la imagen</label>
            </div>
            
            <div class="modal-actions">
                <button class="btn-block" onclick="actualizarProductoForm()">Guardar Cambios</button>
                <button class="btn-cancel" onclick="cerrarModalEdicion()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('user_session');
            if(!session) {
                window.location.href = 'index.html';
            } else {
                renderDashboard();
            }
        });
    </script>
</body>
</html>
