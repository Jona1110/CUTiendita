<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel de Ventas | CUTiendita</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <img src="LOGO_CUTIENDITA.png" alt="CUTiendita Logo" class="nav-logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Ir al Catálogo</a></li>
            <li><a href="#" class="active">Mi Panel</a></li>
        </ul>
    </nav>

    <main id="app-container" class="page active">
        <div class="dashboard-header">
            <div>
                <h2>Mi Panel de Ventas</h2>
                <p id="welcome-msg">Cargando perfil...</p>
            </div>
            <button class="btn-logout" onclick="logoutUser()">Cerrar Sesión</button>
        </div>

        <div class="dashboard-grid">
            <!-- Formulario de Nuevo Producto -->
            <div class="form-card native-card">
                <h3>+ Publicar Producto</h3>
                <p class="form-subtitle" style="margin-bottom: 1.5rem;">Pon a la venta un nuevo artículo en el campus</p>
                
                <div class="input-group">
                    <select id="prod-categoria" required style="width: 100%; padding: 1rem; border: 1px solid var(--border); background: transparent; border-radius: 10px; outline: none; font-size: 1rem; color: var(--text-main);">
                        <option value="" disabled selected hidden>Selecciona una categoría</option>
                        <option value="Comida">🍔 Comida / Botanas</option>
                        <option value="Ropa">👕 Ropa / Accesorios</option>
                        <option value="Papeleria">📚 Papelería / Libros</option>
                        <option value="Electronica">⚡ Electrónica / Celulares</option>
                        <option value="Otros">✨ Otros</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="text" id="prod-nombre" required placeholder=" ">
                    <label>Nombre del producto</label>
                </div>
                <div class="input-group">
                    <input type="text" id="prod-precio" required placeholder=" ">
                    <label>Precio (Ej: $50)</label>
                </div>
                <div class="input-group">
                    <input type="text" id="prod-desc" required placeholder=" ">
                    <label>Descripción corta</label>
                </div>
                
                <!-- SE REEMPLAZA EL INPUT URL POR UN SELECTOR DE GALERÍA NATIVO -->
                <div class="file-upload-wrapper" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--tech-azul); margin-bottom: 0.5rem;">Foto del Producto (Desde tu galería)</label>
                    <input type="file" id="prod-file" accept="image/*" style="width: 100%; padding: 0.5rem; border: 2px dashed var(--border); border-radius: 10px; cursor: pointer;">
                    <div id="preview-container" style="margin-top: 0.5rem; display: none; text-align: center;">
                        <img id="prod-img-preview" src="" style="max-width: 100%; height: 120px; border-radius: 8px; object-fit: cover; border: 2px solid var(--border);">
                    </div>
                </div>

                <button class="btn-block" onclick="publicarProductoForm()">Subir Producto</button>
            </div>

            <!-- Lista de mis productos activos -->
            <div class="my-products-container">
                <h3>Mis Productos Activos</h3>
                <div id="my-products-list" class="my-products">
                    <!-- Artículos aquí -->
                </div>
            </div>
        </div>
    </main>

    <!-- VENTANA MODAL EMERGENTE PARA EDICIÓN -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Editar Producto</h3>
            <p class="form-subtitle">Modifica las propiedades de tu artículo</p>
            <input type="hidden" id="edit-prod-id">
            <input type="hidden" id="edit-prod-img-fallback"> <!-- Guarda la foto vieja por si no la cambian -->
            
            <div class="input-group">
                <select id="edit-prod-categoria" required style="width: 100%; padding: 1rem; border: 1px solid var(--border); background: transparent; border-radius: 10px; outline: none; font-size: 1rem; margin-bottom: 1rem; color: var(--text-main);">
                    <option value="Comida">🍔 Comida / Botanas</option>
                    <option value="Ropa">👕 Ropa / Accesorios</option>
                    <option value="Papeleria">📚 Papelería / Libros</option>
                    <option value="Electronica">⚡ Electrónica / Celulares</option>
                    <option value="Otros">✨ Otros</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="edit-prod-nombre" required placeholder=" ">
                <label>Nombre del producto</label>
            </div>
            <div class="input-group">
                <input type="text" id="edit-prod-precio" required placeholder=" ">
                <label>Precio</label>
            </div>
            <div class="input-group">
                <input type="text" id="edit-prod-desc" required placeholder=" ">
                <label>Descripción corta</label>
            </div>
            
            <!-- SE REEMPLAZA EL INPUT URL EN EL MODAL DE EDICIÓN -->
            <div class="file-upload-wrapper" style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--tech-azul); margin-bottom: 0.5rem;">Cambiar Foto (Opcional)</label>
                <input type="file" id="edit-prod-file" accept="image/*" style="width: 100%; padding: 0.5rem; border: 2px dashed var(--border); border-radius: 10px;">
                <div id="edit-preview-container" style="margin-top: 0.5rem; text-align: center;">
                    <img id="edit-prod-img-preview" src="" style="max-width: 100%; height: 120px; border-radius: 8px; object-fit: cover; border: 2px solid var(--border);">
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-block" onclick="actualizarProductoForm()">Guardar Cambios</button>
                <button class="btn-cancel" onclick="cerrarModalEdicion()">Cancelar</button>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
    <script>
        // Escuchadores dinámicos para mostrar previsualizaciones de la galería en tiempo real
        document.getElementById('prod-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('prod-img-preview').src = event.target.result;
                    document.getElementById('preview-container').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('edit-prod-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('edit-prod-img-preview').src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
