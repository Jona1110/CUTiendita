<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUTiendita | El mercado del CUTonalá</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container" onclick="showSection('home')">
            <img src="LOGO_CUTIENDITA.png" alt="CUTiendita Logo" class="nav-logo">
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="showSection('home')">Inicio</a></li>
            <li><a href="#" id="menu-account" onclick="checkAuthNav()">Mi Cuenta</a></li>
        </ul>
    </nav>

    <main id="app-container">
        <section id="home" class="page active">
            <h1 class="section-title">Productos Disponibles</h1>
            
            <div class="search-filter-bar">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 ¿Qué estás buscando hoy?..." oninput="filtrarProductos()">
                </div>
                <div class="category-tags">
                    <button class="tag active" data-cat="todas" onclick="filtrarCategoria('todas', this)">Todas</button>
                    <button class="tag" data-cat="Comida" onclick="filtrarCategoria('Comida', this)">🍔 Comida</button>
                    <button class="tag" data-cat="Ropa" onclick="filtrarCategoria('Ropa', this)">👕 Ropa/Accesorios</button>
                    <button class="tag" data-cat="Papeleria" onclick="filtrarCategoria('Papeleria', this)">📚 Papelería</button>
                    <button class="tag" data-cat="Electronica" onclick="filtrarCategoria('Electronica', this)">⚡ Electrónica</button>
                    <button class="tag" data-cat="Otros" onclick="filtrarCategoria('Otros', this)">✨ Otros</button>
                </div>
            </div>

            <div class="ad-placeholder">Espacio para Anuncio (AdSense)</div>
            
            <div id="product-grid" class="grid">
                </div>
        </section>

        <section id="login" class="page">
            <div class="form-card">
                <h2>Iniciar Sesión</h2>
                <p class="form-subtitle">Ingresa para administrar tus productos en el CUTonalá</p>
                <div class="input-group">
                    <input type="email" id="login-email" required placeholder=" ">
                    <label>Correo institucional</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-pass" required placeholder=" ">
                    <label>Contraseña</label>
                </div>
                <button class="btn-block" onclick="loginUser()">Entrar</button>
                <p class="form-footer">¿No tienes cuenta? <a href="#" onclick="showSection('register')">Regístrate aquí</a></p>
            </div>
        </section>

        <section id="register" class="page">
            <div class="form-card">
                <h2>Registro de Vendedor</h2>
                <p class="form-subtitle">Forma parte de la red de comercio estudiantil</p>
                <div class="input-group">
                    <input type="text" id="reg-nombre" required placeholder=" ">
                    <label>Nombre completo</label>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-carrera" required placeholder=" ">
                    <label>Carrera</label>
                </div>
                <div class="input-group">
                    <input type="tel" id="reg-tel" required placeholder=" ">
                    <label>WhatsApp (10 dígitos)</label>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" required placeholder=" ">
                    <label>Correo electrónico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pass" required placeholder=" ">
                    <label>Contraseña</label>
                </div>
                <button class="btn-block" onclick="registrarVendedorForm()">Crear cuenta</button>
                <p class="form-footer">¿Ya tienes cuenta? <a href="#" onclick="showSection('login')">Inicia sesión</a></p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
